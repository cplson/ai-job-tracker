# JobTracker production nginx site
# Install: cp to /etc/nginx/sites-available/jobtracker && enable site

# Must match API_PORT in backend/.env (default 5001)
upstream jobtracker_api {
    server 127.0.0.1:5001;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/jobtracker;
    index index.html;

    client_max_body_size 20M;

    location /api/ {
        proxy_pass http://jobtracker_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
