# Production overrides — use with:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  # Postgres is not published to the host in production (API connects via Docker network).

  api:
    image: jobtracker-api:latest
    environment:
      DOTNET_ENVIRONMENT: Production
      ASPNETCORE_ENVIRONMENT: Production
    ports:
      - "127.0.0.1:${API_PORT:-5001}:5000"
