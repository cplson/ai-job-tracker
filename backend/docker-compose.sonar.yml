# SonarQube Community Edition (local or CI host).
# Uses its own Compose project so `deploy.sh` (--remove-orphans on the app stack) does not stop SonarQube.
# Start: docker compose -f docker-compose.sonar.yml up -d
# UI:   http://localhost:9000  (default login admin / admin — change on first use)
#
# Linux hosts may need: sudo sysctl -w vm.max_map_count=262144
# and add vm.max_map_count=262144 to /etc/sysctl.conf for persistence.
#
# On a shared Linode (Jenkins + app + SonarQube), cap JVM heap so a pipeline
# build does not OOM-kill the container. Add swap if the host still struggles:
#   sudo fallocate -l 2G /swapfile && sudo chmod 600 /swapfile
#   sudo mkswap /swapfile && sudo swapon /swapfile

name: sonarqube

services:
  sonarqube-db:
    image: postgres:15-alpine
    container_name: sonarqube_db
    restart: unless-stopped
    mem_limit: 512m
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonar
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar -d sonar"]
      interval: 10s
      timeout: 5s
      retries: 5

  sonarqube:
    image: sonarqube:community
    container_name: sonarqube
    restart: unless-stopped
    mem_limit: 3g
    depends_on:
      sonarqube-db:
        condition: service_healthy
    ports:
      - "${SONAR_PORT:-9000}:9000"
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonar
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar
      # Cap heap on shared CI hosts so Jenkins/dotnet/docker builds do not OOM-kill SonarQube.
      SONAR_WEB_JAVAOPTS: -Xmx512m -Xms256m
      SONAR_CE_JAVAOPTS: -Xmx1536m -Xms256m
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_extensions:/opt/sonarqube/extensions
      - sonarqube_logs:/opt/sonarqube/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9000/api/system/status | grep -q UP || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

volumes:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_extensions:
  sonarqube_logs:
