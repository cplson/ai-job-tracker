services:
  postgres:
    image: postgres:15
    container_name: jobtracker_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    # No host port in base file — API uses Docker network hostname "postgres".
    # For local DB tools, use: docker compose -f docker-compose.yml -f docker-compose.dev.yml up -d
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jobtracker_api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DOTNET_ENVIRONMENT: ${DOTNET_ENVIRONMENT:-Development}
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB};Username=${POSTGRES_USER};Password=${POSTGRES_PASSWORD}
      Jwt__Key: ${Jwt__Key}
      Jwt__Issuer: ${Jwt__Issuer:-JobTrackerAPI}
      Jwt__Audience: ${Jwt__Audience:-JobTrackerClient}
      Cors__AllowedOrigins: ${Cors__AllowedOrigins:-http://localhost:5173}
      OPEN_AI_KEY: ${OPEN_AI_KEY:-}
    depends_on:
      - postgres
    # Port mapping is set in docker-compose.dev.yml or docker-compose.prod.yml

volumes:
  # Fixed name so Jenkins/compose project changes do not create a new empty DB volume.
  pgdata:
    name: backend_pgdata