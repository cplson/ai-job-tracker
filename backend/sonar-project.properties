sonar.projectKey=jobtracker-backend
sonar.projectName=JobTracker Backend

sonar.sourceEncoding=UTF-8

# .NET scanner discovers projects from the solution; these tune analysis and reports.
sonar.exclusions=**/bin/**,**/obj/**,**/Migrations/**,**/TestResults/**
sonar.test.exclusions=**/bin/**,**/obj/**

sonar.cs.cobertura.reportsPaths=**/coverage.cobertura.xml
sonar.cs.vstest.reportsPaths=JobTracker.Tests/TestResults/**/test_results.xml

sonar.coverage.exclusions=**/*Tests.cs,**/JobTracker.Tests/**,**/Migrations/**
